<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>V85 Statistik · ATG Live</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c0f;--surface:#111318;--card:#161a21;--border:#222830;--accent:#f5c842;--accent2:#e87c2e;--green:#2ecc71;--red:#e74c3c;--blue:#4a90d9;--purple:#9b59b6;--text:#e8eaf0;--muted:#6b7280;--hi:#1e2530}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px 0;position:sticky;top:0;z-index:50}
.nav-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--accent)}.logo span{color:var(--text)}
.badge{background:var(--accent2);color:#fff;font-size:.6rem;font-weight:600;letter-spacing:1.5px;padding:3px 8px;border-radius:2px;text-transform:uppercase}
.live{display:flex;align-items:center;gap:5px;font-size:.7rem;font-weight:500;color:var(--green);letter-spacing:1px;text-transform:uppercase}
.dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-right{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
input[type=date]{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:.76rem}
.btn{background:var(--accent);color:#0a0c0f;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.76rem;padding:7px 13px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn.sm{padding:5px 10px;font-size:.7rem}
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.8px;padding:8px 15px;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}.tab:hover:not(.active){color:var(--text)}
main{padding:16px;max-width:1100px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-bottom:18px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.scard.y::before{background:var(--accent)}.scard.o::before{background:var(--accent2)}.scard.g::before{background:var(--green)}.scard.b::before{background:var(--blue)}.scard.r::before{background:var(--red)}.scard.p::before{background:var(--purple)}
.slabel{font-size:.61rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.svalue{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;line-height:1}.ssub{font-size:.67rem;color:var(--muted);margin-top:3px}

/* TABLES */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:auto;margin-bottom:16px;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead th{background:var(--hi);color:var(--muted);font-size:.61rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:8px 10px;text-align:left}
thead th.r{text-align:right}
tbody td{padding:8px 10px;border-bottom:1px solid var(--border)}
tbody td.r{text-align:right}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--hi)}
.mono{font-family:'DM Mono',monospace}
.big{color:var(--accent);font-weight:500}.mid{color:var(--green)}.low{color:var(--muted)}
.badge2{font-size:.6rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.bd{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.2)}
.ba{background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.bu{background:rgba(107,114,128,.1);color:var(--muted);border:1px solid var(--border)}
.win-row td{background:rgba(245,200,66,.05)!important}

/* BARS */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{width:120px;font-size:.73rem;color:var(--muted);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-label.w{width:160px}
.bar-bg{flex:1;background:var(--hi);border-radius:3px;height:8px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.bar-val{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text);width:42px;text-align:right;flex-shrink:0}
.bar-val2{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);width:36px;text-align:right;flex-shrink:0}

/* LAYOUT */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:900px){.three-col{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.three-col{grid-template-columns:1fr}}
.ccrd{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.ctitle{font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.sec{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:1.5px;color:var(--muted);margin:16px 0 10px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

/* LOPP-KNAPPAR */
.lopp-picker{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.lopp-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;padding:8px 14px;transition:all .15s}
.lopp-btn:hover{border-color:var(--accent);color:var(--accent)}
.lopp-btn.active{background:var(--accent);border-color:var(--accent);color:#0a0c0f}

/* FILTER */
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:14px;row-gap:8px}
.filter-label{font-size:.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
select{background:var(--hi);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:.76rem;cursor:pointer}

/* HEATMAP */
.heatmap{display:grid;gap:3px;margin-bottom:14px}
.hm-row{display:flex;gap:3px;align-items:center}
.hm-label{font-size:.68rem;color:var(--muted);width:60px;flex-shrink:0;font-family:'DM Mono',monospace}
.hm-cell{border-radius:3px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-family:'DM Mono',monospace;flex:1;cursor:default;transition:opacity .15s;position:relative}
.hm-cell:hover{opacity:.8}

/* SYSTEM BUILDER */
.system-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:16px}
@media(max-width:800px){.system-grid{grid-template-columns:repeat(4,1fr)}}
.sys-lopp{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px}
.sys-lopp-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--accent);margin-bottom:8px;letter-spacing:1px}
.sys-horse{display:flex;justify-content:space-between;align-items:center;font-size:.7rem;padding:3px 0;border-bottom:1px solid var(--border);cursor:pointer;border-radius:3px;padding:3px 5px}
.sys-horse:last-child{border-bottom:none}
.sys-horse:hover{background:var(--hi)}
.sys-horse.picked{background:rgba(245,200,66,.1);color:var(--accent)}
.sys-horse input{accent-color:var(--accent)}
.sys-pct{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted)}
.sys-summary{background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:14px;margin-bottom:16px}
.sys-sum-title{font-size:.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.sys-rader{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent)}
.sys-info{font-size:.75rem;color:var(--muted);margin-top:6px}

/* MISC */
.div-banner{display:flex;align-items:center;gap:14px;background:rgba(245,200,66,.06);border:1px solid rgba(245,200,66,.2);border-radius:8px;padding:12px 16px;margin:10px 0;flex-wrap:wrap}
.div-amount{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent)}
.src{font-size:.67rem;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:12px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
.spin{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px 20px;color:var(--muted);font-size:.82rem}
.err{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);border-radius:8px;padding:14px;color:var(--red);font-size:.82rem}
.info{background:rgba(74,144,217,.08);border:1px solid rgba(74,144,217,.2);border-radius:6px;padding:10px 14px;font-size:.77rem;color:#7ab8f5;margin-bottom:14px}
.tag{display:inline-block;font-size:.62rem;font-weight:600;padding:2px 7px;border-radius:3px;margin-right:4px}
.tag-v{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.tag-a{background:rgba(232,124,46,.15);color:var(--accent2);border:1px solid rgba(232,124,46,.3)}
.pct-bar{display:inline-block;height:6px;background:var(--accent);border-radius:2px;vertical-align:middle;margin-right:4px}
/* ── RESPONSIVITET ────────────────────────────────────────── */

/* Tablet */
@media(max-width:768px){
  .two-col{grid-template-columns:1fr}
  .three-col{grid-template-columns:1fr 1fr}
  .cgrid{grid-template-columns:1fr}
  .system-grid{grid-template-columns:repeat(4,1fr)}
  main{padding:12px 10px}
  thead th, tbody td{padding:6px 8px}
}

/* Mobil */
@media(max-width:540px){
  /* Header */
  nav{padding:10px 12px 0}
  .logo{font-size:1.6rem}
  .nav-top{gap:8px;margin-bottom:8px}
  .nav-right{flex-wrap:wrap;gap:5px}
  .nav-right input[type=date]{width:130px;font-size:.7rem;padding:5px 6px}
  .btn{font-size:.7rem;padding:6px 10px}
  
  /* Tabs - scroll horisontellt */
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{font-size:.65rem;padding:7px 10px;white-space:nowrap}

  /* Grid */
  .grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .summary-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .two-col,.three-col,.cgrid{grid-template-columns:1fr}
  .system-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  
  /* Siffror */
  .svalue{font-size:1.4rem}
  .sys-rader{font-size:1.6rem}
  
  /* Tabeller - horisontell scroll */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:480px;font-size:.72rem}
  thead th, tbody td{padding:6px 7px}
  
  /* Lopp-analys */
  .lopp-picker{gap:4px}
  .lopp-btn{font-size:.9rem;padding:6px 10px}
  .filter-bar{gap:6px;padding:8px 10px}
  .filter-bar select, .filter-bar input{font-size:.72rem;padding:4px 7px}
  
  /* Race-block */
  .race-hdr{padding:8px 10px}
  
  /* Bar-rader */
  .bar-label{width:80px;font-size:.68rem}
  .bar-label.w{width:100px}
  
  /* Systembyggare */
  .sys-lopp{padding:8px}
  .sys-horse{font-size:.65rem}
  
  /* Huvudinnehåll */
  main{padding:10px 8px}
  .sec{font-size:.85rem;margin:12px 0 8px}
  .info{font-size:.72rem;padding:8px 12px}

  /* Siffrorna i system-grid */
  .sys-lopp-title{font-size:.85rem}
}

/* Liten mobil */
@media(max-width:360px){
  .grid{grid-template-columns:1fr}
  .summary-grid{grid-template-columns:1fr}
  .system-grid{grid-template-columns:repeat(2,1fr)}
  .logo{font-size:1.3rem}
  .tab{font-size:.6rem;padding:6px 8px}
}
</style>
